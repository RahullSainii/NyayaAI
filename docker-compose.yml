version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: nyaya-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: nyaya-backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - qdrant
    volumes:
      - ./data:/app/data

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: nyaya-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  qdrant_storage:
