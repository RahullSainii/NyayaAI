server {
    listen 80;
    
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend
    location /chat { proxy_pass http://backend:8000/chat; }
    location /map { proxy_pass http://backend:8000/map; }
    location /ingest { proxy_pass http://backend:8000/ingest; }
    location /health { proxy_pass http://backend:8000/health; }
}
